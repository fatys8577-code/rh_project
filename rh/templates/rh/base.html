<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>RH Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .navbar { background-color: #1a73e8 !important; }
        .navbar-brand { font-weight: bold; font-size: 1.4rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card-header { background-color: #1a73e8; color: white; border-radius: 12px 12px 0 0 !important; }
        .btn-primary { background-color: #1a73e8; border: none; }
        .btn-primary:hover { background-color: #1558b0; }
        .sidebar { background-color: #ffffff; min-height: 100vh; border-right: 1px solid #dee2e6; }
        .sidebar a { color: #1a73e8; text-decoration: none; display: block; padding: 10px 15px; border-radius: 8px; }
        .sidebar a:hover { background-color: #e8f0fe; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand text-white" href="{% url 'dashboard' %}">
            👥 RH Manager
        </a>
        {% if user.is_authenticated %}
        <div>
            <a href="{% url 'dashboard'%}" class="btn btn-light btn-sm me-2">
                🏠 Accueil
            </a>
            <span class="text-white me-3">👤 {{ user.prenom }}</span>
            <a href="{% url 'profil' %}" class="btn btn-light btn-sm me-2">Mon Profil</a>
            <a href="{% url 'deconnexion' %}" class="btn btn-outline-light btn-sm">Déconnexion</a>
        </div>
        {% endif %}
    </div>
</nav>
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
</body>
</html>
